<!doctype html>
<html lang="pt-BR" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <link rel='shortcut icon' type='image/x-icon' href='/favicon.png' />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: "Liberation Sans", sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 10px;
            line-height: 1.3;
        }
        img {
          max-width: 700px;
          max-width: 100%;
        }
        h1 {font-size: 2.4em;}
        pre, code {
            font-family: "Liberation Mono", "Roboto Mono", "Courier New", monospace;
            font-size: 0.9em;
            border: 1px solid #ffdbdb;
            border-radius: 3px;
            background-color: rgb(255, 249, 249);
            color: rgb(248, 61, 61);
        }
        code {
            padding: 0px 5px;
        }
        pre > code {
          border: none;
        }
        dd {
          margin-bottom: 10px;
        }
        .Medicina {color: #065535;}
        .Boardgames {color: #990000;}
        .Futebol {color: #8EB200;}
        .Séries {color: deeppink;}
        #logo {margin-bottom: 5px;}
        iframe {max-width: 100%;}


        .videoContainer {
          position: relative;
          height: 0;
          padding-top: 56.25%;
          max-width:100%;
        }
        .videoContainer iframe {
          position: absolute;
          top: 0; left: 0;
          border: 0;
          width: 100%;
          height: 100%;
        }


    </style>
  </head>

</html>
